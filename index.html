<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINEC Apure — Sistema de Planificación y Cumplimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --verde: #1a6b3a;
    --verde-claro: #2d9657;
    --verde-oscuro: #0f3d22;
    --dorado: #b8860b;
    --dorado-claro: #d4a017;
    --blanco: #ffffff;
    --gris: #555555;
    --gris-claro: #e8e8e8;
    --negro: #1a1a1a;
    --rojo: #c0392b;
    --azul: #1a4a7a;
    --fondo: #f4f6f4;
    --card-bg: #ffffff;
    --texto: #222222;
    --borde: #d0d8d0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--verde-oscuro);
    border-bottom: 3px solid var(--dorado);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    height: 64px;
  }
